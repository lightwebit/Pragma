<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pragma</title>
    <link rel="icon" href="data:,">
    <style>
      #pragma-splash {
        position: fixed;
        inset: 0;
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 20px;
        transition: opacity 0.25s ease;
      }
      #pragma-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #pragma-splash .splash-title {
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.12em;
        color: #e0e0e0;
      }
      #pragma-splash .splash-dots {
        display: flex;
        gap: 8px;
      }
      #pragma-splash .splash-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #4A90D9;
        animation: splash-bounce 1.1s ease-in-out infinite;
      }
      #pragma-splash .splash-dots span:nth-child(2) { animation-delay: 0.18s; }
      #pragma-splash .splash-dots span:nth-child(3) { animation-delay: 0.36s; }
      #pragma-splash .splash-logo {
        width: 90px;
        height: 90px;
        color: #4A90D9;
        opacity: 0.9;
      }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
        40%            { transform: scale(1);   opacity: 1;   }
      }
    </style>
  </head>
  <body>
    <div id="pragma-splash">
      <svg class="splash-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon
          points="92,50 71,13.6 29,13.6 8,50 29,86.4 71,86.4"
          transform="rotate(90 50 50)"
          stroke="currentColor"
          stroke-width="2.75"
          stroke-linejoin="round"
        />
        <polyline
          points="30,37 46,50 30,63"
          stroke="currentColor"
          stroke-width="6.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <circle cx="74" cy="35" r="2.25" fill="currentColor" />
        <line x1="55" y1="62" x2="74" y2="62" stroke="currentColor" stroke-width="6" stroke-linecap="round" />
      </svg>
      <div class="splash-title">pragma</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
