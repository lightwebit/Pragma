name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag esistente da rilasciare (es. v0.1.0)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'Pragma ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: |
            See [CHANGELOG.md](https://github.com/lightwebit/pragma/blob/main/CHANGELOG.md) for details.

            ## Installing

            | Platform | File | Notes |
            |---|---|---|
            | Windows | `.msi` | recommended |
            | Windows | `.exe` | NSIS alternative |
            | Linux Debian/Ubuntu | `.deb` | `sudo dpkg -i pragma_*.deb` |
            | Linux portable | `.AppImage` | `chmod +x` then run |

            > ⚠️ **Windows SmartScreen:** This build is unsigned. If Windows shows a protection warning, click **More info → Run anyway**.

            ## Requirement

            [Claude Code CLI](https://claude.ai/code) must be installed and accessible in your PATH before launching Pragma.
          releaseDraft: true
          prerelease: false
